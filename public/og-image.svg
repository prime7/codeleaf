<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a1f17;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0d281e;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="60" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <rect width="1200" height="630" fill="url(#bg)"/>
  
  <!-- Grid pattern -->
  <defs>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#4ade80" stroke-width="0.5" opacity="0.08"/>
    </pattern>
  </defs>
  <rect width="1200" height="630" fill="url(#grid)"/>
  
  <!-- Glow effect -->
  <circle cx="900" cy="200" r="250" fill="#4ade80" opacity="0.06" filter="url(#glow)"/>
  <circle cx="300" cy="500" r="200" fill="#22c55e" opacity="0.04" filter="url(#glow)"/>
  
  <!-- Leaf icon -->
  <g transform="translate(140, 180) scale(2.5)">
    <path d="M12 2C7 2 3 7 3 12c0 5 4 10 9 10s9-5 9-10c0-5-4-10-9-10z" fill="none" stroke="#4ade80" stroke-width="1.2" opacity="0.9"/>
    <path d="M12 6c-2 2-3 4-3 6 0 3 2 5 3 6 1-1 3-3 3-6 0-2-1-4-3-6z" fill="#4ade80" opacity="0.8"/>
    <line x1="12" y1="8" x2="12" y2="18" stroke="#4ade80" stroke-width="0.8" opacity="0.6"/>
  </g>
  
  <!-- Brand name -->
  <text x="240" y="245" font-family="system-ui, -apple-system, sans-serif" font-size="72" font-weight="700">
    <tspan fill="#ffffff">code</tspan><tspan fill="#4ade80">leaf</tspan>
  </text>
  
  <!-- Tagline -->
  <text x="240" y="305" font-family="system-ui, -apple-serif, sans-serif" font-size="32" font-weight="400" fill="#a3a3a3">
    AI Automation That Grows Alberta Businesses
  </text>
  
  <!-- Services -->
  <text x="240" y="380" font-family="system-ui, -apple-system, sans-serif" font-size="22" font-weight="500" fill="#d4d4d4">
    AI Chatbots | Voice Agents | CRM Automation | Lead Generation
  </text>
  
  <!-- Location badge -->
  <rect x="240" y="420" width="280" height="44" rx="22" fill="none" stroke="#4ade80" stroke-width="1.5" opacity="0.5"/>
  <text x="380" y="448" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="16" font-weight="500" fill="#4ade80">
    Edmonton and Calgary, Alberta
  </text>
  
  <!-- CTA -->
  <rect x="240" y="500" width="320" height="56" rx="28" fill="#4ade80"/>
  <text x="400" y="535" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="20" font-weight="600" fill="#0a1f17">
    Get Your Free AI Audit
  </text>
  
  <!-- Stats bar -->
  <rect x="800" y="180" width="320" height="320" rx="16" fill="none" stroke="#4ade80" stroke-width="1" opacity="0.15"/>
  
  <text x="860" y="260" font-family="system-ui, -apple-system, sans-serif" font-size="48" font-weight="700" fill="#4ade80">100+</text>
  <text x="860" y="290" font-family="system-ui, -apple-system, sans-serif" font-size="16" font-weight="400" fill="#a3a3a3">Projects Delivered</text>
  
  <text x="860" y="360" font-family="system-ui, -apple-system, sans-serif" font-size="48" font-weight="700" fill="#4ade80">99%</text>
  <text x="860" y="390" font-family="system-ui, -apple-system, sans-serif" font-size="16" font-weight="400" fill="#a3a3a3">Client Satisfaction</text>
  
  <text x="860" y="460" font-family="system-ui, -apple-system, sans-serif" font-size="48" font-weight="700" fill="#4ade80">30+</text>
  <text x="860" y="490" font-family="system-ui, -apple-system, sans-serif" font-size="16" font-weight="400" fill="#a3a3a3">AI Systems Built</text>
  
  <!-- Footer -->
  <text x="600" y="600" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="14" fill="#525252">
    PIPEDA Compliant | Edmonton-Based | Serving All of Alberta
  </text>
</svg>